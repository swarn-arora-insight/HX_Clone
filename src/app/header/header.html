<header class="header shadow-sm py-2 bg-white">
    <div class="mx-5 d-flex align-items-center justify-content-between">
        <!-- Left Logo -->
        <div>
            <img src="logo_right.png" alt="Left Logo" width="105" height="65">
        </div>

        <!-- Center Heading -->
        <h2 class="text-center m-0 flex-grow-1 fw-bold text-primary">
            Agent Prioritization Dashboard
        </h2>

        <!-- Right Section: View Shortlisted + Power Dropdown -->
        <div class="d-flex align-items-center gap-3">
            <!-- View Shortlisted Button -->
            <button *ngIf="showShortlistButton"
                class="btn shot_btn  d-flex align-items-center gap-2 px-3 py-1 rounded-4 shadow-sm"
                (click)="goToShortlist()">
                <i class="bi bi-star-fill text-warning"></i>
                <span class="fw-semibold text-white">View Shortlisted</span>
            </button>

            <!-- Power Button Dropdown -->
            <div class="dropdown">
                <button class="btn btn-light p-0 border-0 bg-transparent" id="logoutDropdown" data-bs-toggle="dropdown"
                    aria-expanded="false">
                    <div class="power-btn d-flex justify-content-center align-items-center">
                        <i class="bi bi-power fs-4 text-light"></i>
                    </div>
                </button>

                <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0 rounded-3"
                    aria-labelledby="logoutDropdown">
                    <li>
                        <button class="dropdown-item text-dark fw-semibold text-center" (click)="logout()">
                            Logout
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</header>
