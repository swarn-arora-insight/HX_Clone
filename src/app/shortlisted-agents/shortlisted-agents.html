<app-header></app-header>

<div class="mx-4 py-4 animate__animated animate__fadeIn">

    <!-- Header -->
    <div class="d-flex align-items-center mb-2 header-row">
        <i class="bi bi-arrow-left fs-4 me-3 text-primary cursor-pointer back-btn" (click)="goBack()"></i>
        <div>
            <h3 class="fw-bold text-dark mb-0">Shortlisted Agents</h3>
            <p class="text-muted small mb-0">Manage and contact your selected agents</p>
        </div>
    </div>

    <!-- Summary Cards -->
    <div class="stats-section p-3 rounded-4 text-center shadow-lg animate__animated animate__fadeInUp d-flex">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="fw-bold text-primary mb-0">Overall Statistics : </h4>
        </div>

        <div class="row g-3 justify-content-start flex-nowrap overflow-auto stats-row ms-3">
            <div class="col-auto" *ngFor="let stat of stats">
                <div class="summary-card d-flex align-items-center gap-3 px-4 py-3 rounded-4 shadow-sm">
                    <h4 class="text-secondary  mb-0">{{ stat.label }} :</h4>
                    <h3 [ngClass]="stat.colorClass || 'text_agent'" class="fw-bold mb-0">{{ stat.value }}</h3>
                </div>
            </div>
        </div>


        <!-- <p class="text-muted mt-4 mb-0">based on your current data overview</p> -->
    </div>

    <!-- Filters Accordion -->
    <div class="accordion filter-accordion mt-3" id="filterAccordion">
        <div class="accordion-item shadow-sm rounded-3 border-1">
            <h2 class="accordion-header">
                <button class="accordion-button collapsed bg-white fw-semibold text-primary" type="button"
                    data-bs-toggle="collapse" data-bs-target="#collapseFilters" aria-expanded="false"
                    aria-controls="collapseFilters">
                    <i class="bi bi-funnel-fill me-2"></i> Filters
                </button>
            </h2>

            <div id="collapseFilters" class="accordion-collapse collapse" data-bs-parent="#filterAccordion">
                <div class="accordion-body">

                    <!-- Show ONLY the 'show' string -->
                    <div class="filter-chip-container">
                        <button *ngFor="let f of filters" class="filter-chip"
                            [ngClass]="{ 'active': selectedFilterLabel() === f.show }"
                            (click)="selectFilter(f); scrollToTable()">
                            {{ f.show }}
                        </button>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <!-- Shortlisted Agents List -->
    <div #tableSection>
        <app-shortlist-agents-detail [Filteredagents]="filteredData()" (refreshList)="shortListedDetails()"
            (agentDeleted)="getShortlistCount()" [selectedFilter]="selectedFilter()">
        </app-shortlist-agents-detail>
    </div>

</div>
